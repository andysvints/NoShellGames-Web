<html lang="en">
<head>
     <link rel="stylesheet" href="style.css">
</head>
<div class="container">
    <div class="logo-placeholder"> <img src=/Assets/noshellgames-logo.png style="width:100;"> </div>
     <h1 class="title">NoShellGames</h1>
    <p class="tagline">No Games. No Threats. Just Clean Shell.</p>
    <p class="subtext">Instantly assess if a script is safe to run.</p>
    <form id="search-form" action="/analyze" method="POST"> 
         <textarea id="scriptInput" name="scriptInput" class="editor" placeholder="Paste your PowerShell script here..."></textarea>
         <button id="analyzeBtn" type="submit" class="analyze-btn">Analyze Risk</button>
    </form>
     
    <div id="loadingState" class="loading-state hidden">
        <div class="spinner"></div>
        <p class="loading-text">Analyzing script risk...</p>
    </div>

    <div id="resultCard" class="result-card hidden">
          <ResultsTemplate>
    </div>
</div>
<footer align="center">&copy;<CurrentYear> NoShellGames</footer>
<script>
const button = document.getElementById("analyzeBtn");
document.getElementById("search-form").addEventListener("submit", async function(e) {
    e.preventDefault(); 

    const scriptText = document.getElementById("scriptInput").value;
    const loading = document.getElementById("loadingState");
    const resultCard = document.getElementById("resultCard");

    button.disabled = true; 
    loading.classList.remove("hidden");
    resultCard.classList.add("hidden");

    try {
        const response = await fetch("/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `scriptInput=${encodeURIComponent(scriptText)}`
        });

        const html = await response.text();
        resultCard.innerHTML = html;
        resultCard.classList.remove("hidden");

    } catch (err) {
        resultCard.innerHTML = "<p style='color:red'>Error analyzing script</p>";
        resultCard.classList.remove("hidden");
    } finally {
        button.disabled = false; 
        loading.classList.add("hidden");
    }
});
</script>
</html>
